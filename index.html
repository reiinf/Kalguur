<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Картоходец v0.073</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root{--gold:#c8a96e;--gold-b:#f0d080;--gold-d:#8a6a2e;--blood:#8b1a1a;--blood-b:#c0392b;--bg0:#0a0806;--bg1:#110e09;--bg2:#1a1510;--bg3:#1f1912;--bg4:#241d14;--brd:#3a2e1e;--brd-g:#5a4a2a;--txt:#d4c4a0;--txt-d:#8a7a60;--txt-b:#f0e0b0;--mag:#8888ff;--rare:#f0d060;--uniq:#e87020;--norm:#b0b0b0;--grn:#4a9a4a;--cyn:#4ab0b0;--red:#c03030;--org:#cc7700;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg0);color:var(--txt);font-family:'Crimson Pro',Georgia,serif;font-size:16px;font-weight:400;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(100,60,10,.15) 0%,transparent 70%);}
#app{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:8px;}
header{text-align:center;padding:12px 0 8px;border-bottom:1px solid var(--brd-g);margin-bottom:10px;position:relative;}
header::after{content:'⚙ МАШИНА КАЛГУУРА ⚙';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);background:var(--bg0);padding:0 10px;font-family:'Cinzel',serif;font-size:9px;color:var(--gold-d);letter-spacing:3px;}
h1{font-family:'Cinzel',serif;font-size:22px;font-weight:900;color:var(--gold);text-shadow:0 0 25px rgba(200,169,110,.4);letter-spacing:4px;display:flex;align-items:center;justify-content:center;gap:10px;}
.ver{font-size:10px;color:var(--gold-d);border:1px solid var(--gold-d);padding:2px 6px;letter-spacing:2px;font-weight:400;}
.sub{font-size:10px;color:var(--txt-d);letter-spacing:2px;margin-top:2px;font-style:italic;}
#res-bar{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap;align-items:stretch;}
.ri{background:var(--bg3);border:1px solid var(--brd);padding:3px 8px;display:flex;align-items:center;gap:5px;font-family:'Cinzel',serif;font-size:13px;clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);flex-shrink:0;}
.ri-ico{font-size:15px;line-height:1;flex-shrink:0;}.ri-lbl{color:var(--txt-d);font-size:11px;letter-spacing:1px;display:block;}.ri-val{color:var(--gold);font-weight:600;}
#atlas-bar{background:var(--bg3);border:1px solid var(--brd-g);padding:5px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;font-size:13px;flex-wrap:wrap;}
.pt-lbl{font-family:'Cinzel',serif;color:var(--gold-d);letter-spacing:1px;font-size:11px;white-space:nowrap;}
.pt-tiers{display:flex;gap:2px;flex-wrap:wrap;}
.pt-t{width:18px;height:12px;background:var(--bg2);border:1px solid var(--brd);font-size:9px;display:flex;align-items:center;justify-content:center;color:var(--txt-d);}
.pt-t.done{background:var(--gold-d);border-color:var(--gold);color:var(--bg0);}
#layout{display:grid;grid-template-columns:310px 1fr 285px;gap:8px;align-items:start;}
.panel{background:var(--bg3);border:1px solid var(--brd);padding:10px;position:relative;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold-d),transparent);}
.ptitle{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);letter-spacing:2px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;gap:6px;}
.tabs{display:flex;gap:1px;margin-bottom:8px;border-bottom:1px solid var(--brd);flex-wrap:wrap;}
.tab-btn{background:transparent;border:none;color:var(--txt-d);font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;padding:5px 9px;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab-btn:hover{color:var(--txt);}.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.tabpanel{display:none;}.tabpanel.active{display:block;}
.mcard{background:var(--bg4);border:1px solid var(--brd);padding:6px 9px;margin-bottom:4px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;}
.mcard:hover{border-color:var(--gold-d);}.mcard.sel{border-color:var(--gold);box-shadow:0 0 7px rgba(200,169,110,.2);}.mcard.cursed{border-color:#9944cc;}
.mtier{font-family:'Cinzel',serif;font-size:9px;font-weight:900;width:22px;text-align:center;}.mname{flex:1;font-size:14px;color:var(--txt-b);font-weight:500;}.mcnt{background:var(--bg2);border:1px solid var(--brd);padding:2px 6px;font-size:12px;font-family:'Cinzel',serif;}.mreward{font-size:12px;color:var(--txt-d);}
.mch-wrap{display:flex;align-items:center;gap:3px;margin-top:2px;}.mch-bg{flex:1;height:2px;background:var(--bg2);}.mch-fill{height:100%;}.mch-pct{font-size:11px;font-family:'Cinzel',serif;min-width:26px;text-align:right;}
.run-vis{background:var(--bg4);border:1px solid var(--brd);min-height:140px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.run-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 80%,rgba(80,20,0,.3) 0%,transparent 70%);}
.run-con{position:relative;z-index:1;text-align:center;padding:8px;}.run-nm{font-family:'Cinzel',serif;font-size:17px;color:var(--gold);margin-bottom:4px;}
.prog-wrap{margin:4px 0;}.prog-lbl{font-size:9px;color:var(--txt-d);margin-bottom:2px;display:flex;justify-content:space-between;}
.prog-bar{height:6px;background:var(--bg2);border:1px solid var(--brd);overflow:hidden;position:relative;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold-d),var(--gold));transition:width .1s linear;}
.prog-fill.red{background:linear-gradient(90deg,#882200,#ff4400);}.prog-fill.grn{background:linear-gradient(90deg,#1a5a1a,#4a9a4a);}.prog-fill.purple{background:linear-gradient(90deg,#330066,#9900ff);}
.btn{background:linear-gradient(180deg,rgba(200,169,110,.15),rgba(200,169,110,.05));border:1px solid var(--gold-d);color:var(--gold);font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;padding:8px 14px;cursor:pointer;transition:all .2s;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);}
.btn:hover:not(:disabled){background:linear-gradient(180deg,rgba(200,169,110,.3),rgba(200,169,110,.1));border-color:var(--gold);box-shadow:0 0 10px rgba(200,169,110,.2);}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-r{border-color:var(--blood);color:#ff6666;background:linear-gradient(180deg,rgba(139,26,26,.2),rgba(139,26,26,.05));}.btn-r:hover:not(:disabled){border-color:var(--blood-b);}
.btn-g{border-color:#2a6a2a;color:#6acf6a;background:linear-gradient(180deg,rgba(26,80,26,.2),rgba(26,80,26,.05));}.btn-g:hover:not(:disabled){border-color:#4a9a4a;}
.btn-p{border-color:#553388;color:#bb66ff;background:linear-gradient(180deg,rgba(85,51,136,.2),rgba(85,51,136,.05));}.btn-p:hover:not(:disabled){border-color:#aa66ff;}
.btn-sm{padding:4px 11px;font-size:11px;}
.wslot{background:var(--bg4);border:1px solid var(--brd);padding:8px 9px;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.wavat{width:32px;height:32px;border-radius:50%;border:2px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.winfo{flex:1;min-width:0;}.wname{font-size:14px;color:var(--txt-b);}.wcls{font-size:10px;color:var(--txt-d);letter-spacing:1px;}
.wst{font-size:10px;padding:1px 5px;border:1px solid;letter-spacing:1px;font-family:'Cinzel',serif;}
.st-idle{color:var(--txt-d);border-color:var(--brd);}.st-run{color:var(--grn);border-color:var(--grn);animation:pg 2s infinite;}.st-cap{color:var(--red);border-color:var(--red);animation:pr 1.5s infinite;}.st-inj{color:var(--org);border-color:var(--org);}.st-exp{color:#bb66ff;border-color:#553388;animation:pg 2s infinite;}
@keyframes pg{0%,100%{opacity:1}50%{opacity:.6}}@keyframes pr{0%,100%{opacity:1;box-shadow:0 0 4px rgba(200,50,50,.3)}50%{opacity:.7;box-shadow:none}}
.wxp{height:2px;background:var(--bg2);margin-top:3px;}.wxp-f{height:100%;background:linear-gradient(90deg,#553388,#aa66ff);}
.lvl-b{display:inline-block;background:rgba(170,100,255,.15);border:1px solid #553388;color:#aa66ff;font-family:'Cinzel',serif;font-size:11px;padding:1px 4px;margin-left:3px;}
#loot-log{background:var(--bg4);border:1px solid var(--brd);height:300px;overflow-y:auto;padding:4px 8px;font-size:13px;display:flex;flex-direction:column-reverse;gap:1px;}
#loot-log::-webkit-scrollbar{width:3px;}#loot-log::-webkit-scrollbar-thumb{background:var(--gold-d);}
.le{padding:1px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.ge{color:var(--gold);}.i-n{color:var(--norm);}.i-m{color:var(--mag);}.i-r{color:var(--rare);}.i-u{color:var(--uniq);}.ev{color:#ff8844;font-style:italic;}.info{color:var(--cyn);}.lt{color:var(--txt-d);margin-right:3px;font-size:8px;}
.igrid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;max-height:300px;overflow-y:auto;}
.igrid::-webkit-scrollbar{width:3px;}
.iico{background:var(--bg4);border:1px solid var(--brd);aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;transition:all .15s;position:relative;}
.iico:hover{transform:scale(1.08);}
.iico.n{border-color:#444;}.iico.m{border-color:#5555aa;}.iico.r{border-color:#aaaa00;}.iico.u{border-color:#cc5500;}
.isp{position:absolute;bottom:1px;right:2px;font-size:12px;font-weight:bold;color:var(--gold-d);font-family:'Cinzel',serif;}
#tt{position:fixed;background:var(--bg1);border:1px solid var(--gold-d);padding:8px 12px;max-width:260px;pointer-events:none;z-index:9999;display:none;font-size:11px;box-shadow:0 0 18px rgba(0,0,0,.9);}
.tt-nm{font-family:'Cinzel',serif;font-size:16px;margin-bottom:4px;}.tt-ty{font-size:8px;color:var(--txt-d);margin-bottom:4px;letter-spacing:1px;border-bottom:1px solid var(--brd);padding-bottom:3px;}
.tt-st{color:var(--mag);padding:2px 0;font-size:14px;}.tt-dv{border:none;border-top:1px solid var(--brd);margin:4px 0;}.tt-sm{font-size:11px;color:var(--txt-d);line-height:1.7;}.tt-sv{color:var(--gold-d);font-size:9px;margin-top:2px;}
.srow{background:var(--bg4);border:1px solid var(--brd);padding:7px 9px;margin-bottom:3px;display:flex;align-items:center;gap:7px;}
.si{flex:1;}.snm{font-size:14px;color:var(--txt-b);}.sds{font-size:11px;color:var(--txt-d);margin-top:1px;}.spr{color:var(--gold);font-family:'Cinzel',serif;font-size:12px;white-space:nowrap;}
#notif-area{position:fixed;top:70px;right:14px;z-index:9500;display:flex;flex-direction:column;gap:4px;max-width:270px;}
.notif{background:var(--bg1);border:1px solid var(--gold-d);padding:7px 11px;font-size:10px;animation:sli .3s ease,fao .5s ease 2.5s forwards;}
.notif.red{border-color:var(--blood-b);color:#ff8888;}.notif.grn{border-color:var(--grn);color:#88ff88;}.notif.pur{border-color:#aa66ff;color:#cc99ff;}
@keyframes sli{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}@keyframes fao{to{opacity:0;transform:translateX(18px)}}
.eqsl{background:var(--bg2);border:1px dashed var(--brd);padding:8px 10px;font-size:14px;color:var(--txt-d);min-height:52px;cursor:pointer;display:flex;flex-direction:column;gap:3px;transition:all .15s;}
.eqsl:hover{border-color:var(--gold-d);}.eqsl.filled{border-style:solid;border-color:var(--brd);color:var(--txt);}
.eqlbl{font-size:12px;color:var(--txt-d);letter-spacing:1px;font-weight:600;}
#moverlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:800;display:none;align-items:center;justify-content:center;}
#moverlay.on{display:flex;}
#mbox{background:var(--bg3);border:1px solid var(--gold-d);padding:16px;max-width:480px;width:92%;max-height:85vh;overflow-y:auto;box-shadow:0 0 35px rgba(0,0,0,.9);}
#mbox::-webkit-scrollbar{width:3px;}#mbox::-webkit-scrollbar-thumb{background:var(--gold-d);}
.mtl{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--brd);}
@keyframes fup{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-50px);opacity:0}}
.fl{position:fixed;pointer-events:none;font-family:'Cinzel',serif;font-size:12px;z-index:9999;animation:fup 1.2s ease forwards;}
.sep{border:none;border-top:1px solid var(--brd);margin:6px 0;}.dim{color:var(--txt-d);}.gt{color:var(--gold);}.rt{color:var(--red);}.grnt{color:var(--grn);}.tiny{font-size:11px;color:var(--txt-d);}.dp{color:var(--mag);}.dn{color:var(--red);}
#self-sec{background:var(--bg4);border:1px solid var(--brd-g);padding:8px;margin-bottom:8px;}
.act-card{background:var(--bg4);border:1px solid var(--brd);padding:8px 9px;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.act-pg{height:3px;background:var(--bg2);margin-top:3px;}.act-pgf{height:100%;background:var(--grn);transition:width .1s;}
#atlas-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.at-cell{background:var(--bg4);border:1px solid var(--brd);padding:6px 4px;text-align:center;}
.at-cell.done{border-color:var(--gold-d);background:rgba(200,169,110,.08);}.at-cell.locked{opacity:.4;}
.ach-row{background:var(--bg4);border:1px solid var(--brd);padding:7px 9px;margin-bottom:3px;display:flex;align-items:center;gap:8px;}
.ach-row.done{border-color:var(--gold-d);background:rgba(200,169,110,.06);}.ach-row.pending{border-color:#cc7700;background:rgba(170,90,0,.1);animation:pr 2s infinite;}
.ach-ico{font-size:20px;width:28px;text-align:center;flex-shrink:0;}
.ach-nm{font-size:13px;color:var(--txt-b);}.ach-ds{font-size:11px;color:var(--txt-d);}.ach-rw{font-size:11px;color:var(--gold-d);}
#dbg-out{background:var(--bg0);border:1px solid #333;padding:8px;font-family:monospace;font-size:9px;color:#88ff88;max-height:400px;overflow-y:auto;line-height:1.6;}
</style>

</head>
<body>
<div id="app">
<header>
  <h1>КАРТОХОДЕЦ <span class="ver" id="ver-span">v0.073</span></h1>
</header>
<div id="res-bar">
  <div class="ri" id="ri-gold"><span class="ri-ico">💰</span><div><span class="ri-lbl">ЗОЛОТО</span><span class="ri-val" id="r-gold">0</span></div></div>
  <div class="ri" id="ri-maps-bar"><span class="ri-ico">🗺</span><div><span class="ri-lbl">КАРТЫ</span><span class="ri-val" id="r-maps">0</span></div></div>
  <div class="ri" id="ri-items-bar"><span class="ri-ico">⚔️</span><div><span class="ri-lbl">ПРЕДМЕТЫ</span><span class="ri-val" id="r-items">0</span></div></div>
  <div class="ri" id="ri-workers-bar"><span class="ri-ico">👥</span><div><span class="ri-lbl">РАБОТНИКИ</span><span class="ri-val" id="r-workers">0</span></div></div>
  <div class="ri" id="ri-del-orbs-ri" style="display:none"><span class="ri-ico">🔮</span><div><span class="ri-lbl">ОРБЫ</span><span class="ri-val" id="r-del-orbs">0</span></div></div>
  <div class="ri" id="ri-del-spl-ri" style="display:none"><span class="ri-ico">👁</span><div><span class="ri-lbl">ОСКОЛКИ</span><span class="ri-val" id="r-del-spl">0</span></div></div>
  <div class="ri" id="ri-runs-bar" style="display:none"><span class="ri-ico">🔄</span><div><span class="ri-lbl">ПРОЙДЕНО</span><span class="ri-val" id="r-runs">0</span></div></div>
  <div class="ri" id="ri-pres" style="display:none"><span class="ri-ico">✨</span><div><span class="ri-lbl">ПРЕСТИЖ</span><span class="ri-val" id="r-pres">0</span></div></div>
  <button id="btn-manual-save" onclick="manualSave()" style="margin-left:auto;background:var(--bg3);border:1px solid var(--brd);color:var(--txt-d);font-size:10px;font-family:'Cinzel',serif;padding:2px 7px;cursor:pointer;clip-path:polygon(6px 0,100% 0,calc(100% - 6ppx) 100%,0 100%);letter-spacing:1px" title="Сохранить прогресс">💾 СОХРАНИТЬ</button>
</div>
<div id="atlas-bar-wrap" style="display:none"><div id="atlas-bar">
  <span class="pt-lbl">АТЛАС:</span>
  <div class="pt-tiers" id="pt-tiers"></div>
  <span id="pt-hint" class="dim" style="font-size:12px;margin-left:4px"></span>
  <button id="btn-passive-tree" class="btn btn-sm" style="margin-left:auto;font-size:11px;display:none" onclick="openPassiveTree()">🌐 Дерево атласа</button>
</div></div>
<div id="layout">
<!-- LEFT -->
<div>
  <div class="panel">
    <div class="tabs">
      <button class="tab-btn active" id="tabbtn-maps" data-tab="maps">🗺 КАРТЫ</button>
      <button class="tab-btn" id="tabbtn-shop" data-tab="shop" style="display:none">🏪 ЛАВКА</button>
      <button class="tab-btn" id="tabbtn-inv" data-tab="inv" style="display:none">🎒 СКЛАД</button>
      
      <button class="tab-btn" id="tabbtn-atlas" data-tab="atlas" style="display:none">🌐 АТЛАС</button>
      <button class="tab-btn" id="tabbtn-ach" data-tab="ach" style="display:none">🏆 АРХИВ</button>

    </div>
    <div id="tab-maps" class="tabpanel"></div>
    <div id="tab-shop" class="tabpanel"></div>
    <div id="tab-inv" class="tabpanel"></div>
    
    <div id="tab-atlas" class="tabpanel"></div>
    <div id="tab-ach" class="tabpanel"></div>
  </div>
</div>
<!-- CENTER -->
<div>
  <div id="self-sec">
    <div class="ptitle">🧙 ВЫ — ИЗГНАННИК <span id="self-cls-badge" style="font-size:10px;color:var(--txt-d)"></span></div>
    <div id="cls-row" style="display:none;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:6px">
      <div><div class="tiny">КЛАСС</div><div style="display:flex;gap:4px;margin-top:2px" id="cls-btns" style="font-size:13px">
        <button class="btn btn-sm" data-cls="warrior" id="cls-warrior">⚔️ Дикарь</button>
        <button class="btn btn-sm" data-cls="mage" id="cls-mage">🔮 Ведьма</button>
        <button class="btn btn-sm" data-cls="ranger" id="cls-ranger">🏹 Охотница</button>
        <button class="btn btn-sm" data-cls="noble" id="cls-noble" style="display:none;border-color:#e8c020;color:#e8c020">👸 Дворянка</button>
      </div></div>
      <div id="inv-btn-wrap" style="display:none;margin-left:auto"><button class="btn btn-sm" id="btn-self-eq">🎒 Снаряжение</button></div>
    </div>
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <div><div class="tiny">⚔️ УРОН</div><div class="gt" style="font-family:'Cinzel',serif;font-size:16px" id="s-dmg">5</div></div>
      <div><div class="tiny">🛡 ВЫЖИВАЕМОСТЬ</div><div class="grnt" style="font-family:'Cinzel',serif;font-size:16px" id="s-surv">10</div></div>
      <div><div class="tiny">✅ ШАНС</div><div style="font-family:'Cinzel',serif;font-size:13px" id="s-ch">—</div></div>
      <div style="flex:1;min-width:120px"><div class="tiny">⭐ УРОВЕНЬ <span id="s-lvl-xp" style="color:var(--mag)"></span></div><div style="display:flex;align-items:center;gap:6px;margin-top:2px"><span class="gt" style="font-family:'Cinzel',serif;font-size:16px" id="s-lvl">0</span><button class="btn btn-sm btn-p" id="btn-self-lvlup" style="display:none;padding:2px 8px;font-size:12px">Повысить</button></div><div style="height:3px;background:var(--bg2);border:1px solid var(--brd);margin-top:3px;width:100%"><div id="s-xp-bar" style="height:100%;background:linear-gradient(90deg,#553388,#aa66ff);width:0%"></div></div></div>

function buyPassive(id){
  if(!(G.passivePending>0))return;
  // Find node
  let found=null;
  for(const br of PASSIVE_TREE.branches){
    for(let ni=0;ni<br.nodes.length;ni++){
      if(br.nodes[ni].id===id){
        // Check previous node owned (or first)
        if(ni===0||(G.passives||{})[br.nodes[ni-1].id]){found=br.nodes[ni];}
      }
    }
  }
  if(!found){showN('Сначала разблокируйте предыдущий узел!','red');return;}
  if((G.passives||{})[found.id]){showN('Уже куплено!','red');return;}
  if(!G.passives)G.passives={};
  G.passives[found.id]=true;
  G.passivePending--;
  log('🌐 Пассивка: '+found.nm+' ('+found.desc+')','info');
  showN('🌐 '+found.nm+' активирована!','pur');
  // Recalc workers if workerStatPct changed
  if(found.stat==='workerStatPct')G.workers.forEach(w=>recalcW(w));
  save();openPassiveTree();
}

function passiveVal(stat){
  const p=G.passives||{};
  let total=0;
  for(const br of PASSIVE_TREE.branches){
    for(const nd of br.nodes){
      if(nd.stat===stat&&p[nd.id])total+=nd.val;
    }
  }
  return total;
}

const calcCh=(power,tier,dgrOverride)=>{
  const t=Math.max(1,Math.min(16,tier||1));

};
// Parse any map key (normal "5", cursed "c5", uniq "u5", guardian "grd_g_hydra") → tier int
const parseMapKey=k=>{
  const s=String(k);
  if(s.startsWith('grd_')||s.startsWith('boss_'))return 16;
  if(s.startsWith('c')||s.startsWith('u'))return parseInt(s.slice(1))||1;
  return parseInt(s)||1;
};

const getMd=k=>{
  const s=String(k);
  if(s.startsWith('grd_')){const gm=GUARDIAN_MAPS.find(g=>'grd_'+g.id===s);return gm||MAP_TIERS[15];}
  if(s.startsWith('boss_')){const b=BOSSES.find(b2=>'boss_'+b2.id===s);return b||BOSSES[0];}
  return MAP_TIERS[(parseMapKey(k)-1)]||MAP_TIERS[0];
};
const chcol=ch=>ch>=0.8?'#4acf4a':ch>=0.5?'#cfcf4a':ch>=0.25?'#cf8040':'#cf4040';
const iDmg=(it,cls)=>{if(!it||!it.mods)return 0;const r=CDMG[cls]||[];return Math.floor(it.mods.reduce((s,m)=>s+(r.includes(m.stat)?m.value*1:m.value*.08),0));};
const iSurv=(it,cls)=>{if(!it||!it.mods)return 0;const r=CSURV[cls]||[];return Math.floor(it.mods.reduce((s,m)=>s+(r.includes(m.stat)?m.value*1:m.value*.08),0));};
const sDmg=()=>{const sc=G.selfCls||'warrior';let v=3+G.selfLevel*2;const ss=G.syndExtraWeapon?[...SLOTS,'weapon2']:SLOTS;ss.forEach(s=>{if(G.selfEq[s]&&s!=='cluster')v+=iDmg(G.selfEq[s],sc);});const _cl=G.selfEq&&G.selfEq.cluster;const _dp=_cl?(_cl.mods||[]).reduce((a,m)=>a+(m.stat==='dmgPct'?m.value:0),0):0;return Math.floor(v*(1+_dp/100));};
const sSurv=()=>{const sc=G.selfCls||'warrior';let v=5+G.selfLevel*2;const ss=G.syndExtraWeapon?[...SLOTS,'weapon2']:SLOTS;ss.forEach(s=>{if(G.selfEq[s]&&s!=='cluster')v+=iSurv(G.selfEq[s],sc);});const _cl=G.selfEq&&G.selfEq.cluster;const _sp=_cl?(_cl.mods||[]).reduce((a,m)=>a+(m.stat==='survPct'?m.value:0),0):0;return Math.floor(v*(1+_sp/100));};
function recalcW(w){const _wsp=passiveVal('workerStatPct');const nb=w.isNamed?6:0;let d=4+w.level*2+nb,s=4+w.level*2+nb;SLOTS.forEach(sl=>{if(w.eq[sl]){d+=iDmg(w.eq[sl],w.cls);s+=iSurv(w.eq[sl],w.cls);}});w.dmg=Math.floor(d*(1+_wsp/100));w.surv=Math.floor(s*(1+_wsp/100));}

const xpAmt=tier=>tier*8+12;
// Gold formula: rand(mapCost, mapCost*(1+variance)) * prestige
// variance = (g1-g0)/g0 — natural spread of the tier
const goldReward=(md,_power,mapCost=0)=>{
  const pm=1+(G.prestigeBonus||0)/100;
  const _clu=G.selfEq&&G.selfEq.cluster;const _gp=_clu?(_clu.mods||[]).reduce((s,m)=>s+(m.stat==='goldPct'?m.value:0),0):0;
  const base=mapCost||md.g[0]||1;
  const variance=(md.g[1]-md.g[0])/Math.max(1,md.g[0]);
  const rnd=base+Math.floor(Math.random()*(base*variance+1));
  return Math.floor(rnd*pm*(1+(_gp+passiveVal('goldPct'))/100));
};
const goldMin=(md,mapCost=0)=>{
  const pm=1+(G.prestigeBonus||0)/100;
  return Math.floor((mapCost||md.g[0]||1)*pm);
};
const goldMax=(md,mapCost=0)=>{
  const pm=1+(G.prestigeBonus||0)/100;
  const base=mapCost||md.g[0]||1;
  const variance=(md.g[1]-md.g[0])/Math.max(1,md.g[0]);
  return Math.floor(base*(1+variance)*pm);
};

function genItem(tier,workerCls){
  let pool=IBASES;
  if(workerCls)pool=Math.random()<.38?IBASES.filter(b=>b.cls===workerCls):IBASES;
  if(!pool.length)pool=IBASES;
  const base=pool[Math.floor(Math.random()*pool.length)];
  const r=Math.random();
  const quality=tier>=16&&r<.18?'unique':tier>=14&&r<.12?'unique':tier>=10&&r<.07?'unique':tier>=5&&r<.28?'rare':r<.60?'magic':'normal';
  const cnt={normal:1,magic:ri(1,2),rare:ri(3,5),unique:4}[quality];
  // Unique items are 1.4x stronger than rare
  const qm={normal:1,magic:1.25,rare:1.6,unique:2.24}[quality];
  const mods=[...base.mods].sort(()=>Math.random()-.5).slice(0,cnt).map(stat=>({stat,value:Math.floor((tier*2+ri(3,12))*qm)}));
  const sp=Math.floor({normal:3,magic:8,rare:22,unique:75}[quality]*(1+tier*.35));
  const pfx=NPFX[base.cls]||NPFX.generic,sfx=NSFX[base.cls]||NSFX.generic;
  const nm=quality==='normal'?base.nm:quality==='magic'?pfx[ri(0,pfx.length-1)]+' '+base.nm:pfx[ri(0,pfx.length-1)]+' '+base.nm+' '+sfx[ri(0,sfx.length-1)];
  return {id:++G.iid,name:nm,em:base.em,cls:base.cls,slot:base.slot,quality,mods,tier,sellPrice:sp};
}
function tryItem(md,cls,mult=1){
  const _cluDp=(G.selfEq&&G.selfEq.cluster?(G.selfEq.cluster.mods||[]).reduce((s,m)=>s+(m.stat==='dropPct'?m.value:0),0):0)+passiveVal('dropPct');
  if(Math.random()>md.drop*mult*(1+_cluDp/100))return;
  const it=genItem(md.t,cls);G.inv.push(it);G.stats.fi++;
  checkContractFind(it.quality);
  log(it.em+' <span style="color:'+qcol(it.quality)+'">'+it.name+'</span> ['+qlbl(it.quality)+']','i-'+it.quality[0]);
  checkAchs();applyUnlocks();
}
function tryMap(md){
  if(!md||!md.t)return; // guardian/boss maps have no .md drop field
  const _cluMp=(G.selfEq&&G.selfEq.cluster?(G.selfEq.cluster.mods||[]).reduce((s,m)=>s+(m.stat==='mapDropPct'?m.value:0),0):0)+passiveVal('mapDropPct');
  if(Math.random()>(md.md||0)*(1+_cluMp/100))return;
  const _tierBonus=passiveVal('mapTierBonus');const dt=Math.max(1,Math.min(16,(md.t||16)+_tierBonus+ri(0,Math.min(3,(md.mx||16)-(md.t||16)))));
  // Guardian maps drop from T16
  const _cluGp=(G.selfEq&&G.selfEq.cluster?(G.selfEq.cluster.mods||[]).reduce((s,m)=>s+(m.stat==='grdDropPct'?m.value:0),0):0)+passiveVal('grdDropPct');
  if(md.t>=14&&Math.random()<Math.min(0.6,.25*(1+_cluGp/100))){
    const gm=GUARDIAN_MAPS[Math.floor(Math.random()*GUARDIAN_MAPS.length)];
    G.maps['grd_'+gm.id]=(G.maps['grd_'+gm.id]||0)+1;
    log('🔷 Карта стража «'+gm.nm+'» упала!','ev');
    renderMaps();return;
  }
  if(md.t>=12&&Math.random()<.10){
    const uPool=UNIQ_MAPS.filter(m=>m.t<=dt);const uMap=uPool.length?uPool[Math.floor(Math.random()*uPool.length)]:UNIQ_MAPS[UNIQ_MAPS.length-1];
    G.maps['u'+dt]=(G.maps['u'+dt]||0)+1;
    G.uniqMapData=G.uniqMapData||{};G.uniqMapData['u'+dt]=uMap;
    log('🗺🟠 Уникальная карта «'+uMap.nm+'» T'+dt+' упала!','ev');
    renderMaps();return;
  }
  const _cursedPct=passiveVal('cursedMapPct');if(Math.random()<Math.min(0.35,.12*(1+_cursedPct/100))){G.maps['c'+dt]=(G.maps['c'+dt]||0)+1;log('🗺💜 Заражённая T'+dt+'!','ev');}
  else{G.maps[dt]=(G.maps[dt]||0)+1;log('🗺 Карта T'+dt+' упала','info');}
  renderMaps();
}

function selfRun(){
  if(!G.selMap){showN('Выберите карту!');return;}
  if(G.selfRun){showN('Уже в походе!');return;}
  if(G.actRun){showN('Уже в акте!');return;}
  const key=String(G.selMap);
  const cursed=key.startsWith('c');
  const uniq=key.startsWith('u');
  const isGrd=key.startsWith('grd_');
  const isBoss=key.startsWith('boss_');
  const tier=cursed||uniq?parseInt(key.slice(1)):(isGrd||isBoss)?16:parseInt(key);
  const bossId=isBoss?key.slice(5):null;
  const grdMapData=isGrd?GUARDIAN_MAPS.find(g=>'grd_'+g.id===key):null;
  const bossData=isBoss?BOSSES.find(b=>b.id===bossId):null;
  if(isBoss){
    const isAltBoss=bossId==='exarch'||bossId==='eater';
    if(isAltBoss){
      if(G.pendingBoss!==bossId&&G.bossTriesLeft<=0){showN('Этот босс недоступен!');return;}
      if(G.bossTriesLeft<=0){G.pendingBoss=null;G.bossTriesLeft=6;G.activeBossId=bossId;log('💥 '+bossData.nm+' вызван! 6 попыток.','ev');}
    } else {
      const pcs=G.guardianPieces.shaper||0;
      if(pcs<4&&G.bossTriesLeft<=0){showN('Нужно 4 фрагмента Создателя!');return;}
      if(pcs>=4&&G.bossTriesLeft<=0){
        Object.entries(bossData.req).forEach(([k2,v2])=>{G.guardianPieces[k2]=Math.max(0,(G.guardianPieces[k2]||0)-v2);});
        G.bossTriesLeft=6;G.activeBossId=bossId;log('💠 Создатель призван! 6 попыток.','ev');
      }
    }
  } else {
    if(!(G.maps[key]>0)){showN('Нет карт!');return;}
    G.maps[key]--;
  }
  // Lock class on first run
  G.clsLocked=true;
  if(!G.selfCls){showN('Сначала выбери класс!','red');return;}
  const md=isGrd?(grdMapData||MAP_TIERS[15]):isBoss?(bossData||BOSSES[0]):MAP_TIERS[tier-1];
  const cost=(isGrd||isBoss)?0:SHOP_COSTS[tier]||0;

function tryAutoExp(w){
  if(!G.autoExp||!hasFaction('maraketh'))return;
  if(w.status!=='idle')return;
  const maxSlots=(G.factionUnlocks&&G.factionUnlocks.exp5)?5:3;
  // Build available tier counts
  const tierCounts={};
  Object.keys(G.maps).filter(k=>!isNaN(k)&&G.maps[k]>0).forEach(k=>{
    const t=parseInt(k);tierCounts[t]=(tierCounts[t]||0)+G.maps[k];
  });
  if(Object.keys(tierCounts).length<1)return;
  // Strict mode: only use lastExpSlots, skip if not enough cards
  if(!G.lastExpSlots||!G.lastExpSlots.length)return;
  const tc2={...tierCounts};
  const slots=[];
  for(const t of G.lastExpSlots.slice(0,maxSlots)){
    if(t&&tc2[t]>0){slots.push(t);tc2[t]--;}
    else if(t){return;} // missing a required tier — don't go
  }
  if(slots.length<3)return; // need at least 3
  // Consume maps
  const filledSlots=slots.filter(Boolean);
  const needed={};filledSlots.forEach(t=>{needed[t]=(needed[t]||0)+1;});
  for(const t in needed){
    if((G.maps[parseInt(t)]||0)<needed[t])return; // not enough maps
  }
  for(const t in needed){G.maps[parseInt(t)]=Math.max(0,(G.maps[parseInt(t)]||0)-needed[t]);}
  G.lastExpSlots=[...slots];
  // Start expedition directly (bypass startExpedition which reads window._exp)
  w.status='exp';w.expTiers=[...slots];w.expIdx=0;w.elapsed=0;w.prog=0;w.curMap=slots[0];
  log('🔄 '+w.name+' — авто-экспедиция: T'+slots.join(', T'),'info');
  renderWorkers();renderMaps();updateRes();
}
function resolveExpStep(w){

  if(!ok){

  }
  const ecost=SHOP_COSTS[tier]||0;
  const _expGb=1.2*(1+passiveVal('expGoldPct')/100);const g=Math.floor(goldReward(md,power,ecost)*_expGb);G.gold+=g;G.stats.ge+=g;
  G.cleared[tier]=true;if(tier>G.maxTier)G.maxTier=tier;
  if(tier===16)checkT16BossUnlock();

// ══════════ ACHIEVEMENTS ══════════════════════════════════════
function checkAchs(){
  function grant(id){
    if(G.achs[id])return;
    if(!G.achsPending)G.achsPending={};
    if(G.achsPending[id])return;
    G.achsPending[id]=true;
    const a=ACHDEFS.find(x=>x.id===id);
    if(a){log('🏆 АРХИВ: '+a.nm+' — заберите награду!','info');showN('🏆 '+a.nm+' — перейдите в Архив!','pur');}
    updateAchBadge();renderAchs();
  }
  if(G.stats.mr>=1)grant('first_run');
  if(G.cleared[5])grant('t5_clear');
  if(G.cleared[10])grant('t10_clear');
  if(G.cleared[16])grant('t16_clear');
  if(G.workers.length>=3)grant('hire3');
  if(G.totalRuns>=50)grant('runs50');
  if(G.totalRuns>=200)grant('runs200');
  if(G.stats.fi>=20)grant('items20');
  const allEq=[...G.inv,...Object.values(G.selfEq),...G.workers.flatMap(w=>Object.values(w.eq))].filter(Boolean);
  if(allEq.some(x=>x.quality==='rare'))grant('rare_item');
  if(allEq.some(x=>x.quality==='unique'))grant('uniq_item');
  if(G.stats.sg>=500)grant('sell500');
  if(canPrestige())grant('all16');
  if((G.stats.contractsDone||0)>=1)grant('con_first');
  if((G.stats.contractsDone||0)>=10)grant('con_10');
  if((G.stats.contractsDone||0)>=25)grant('con_25');
  if((G.stats.mastersDone||0)>=1)grant('master_1');
  if((G.stats.delWaves||0)>=1)grant('del_first');
  if((G.stats.delMaxWave||0)>=5)grant('del_wave5');
  if((G.stats.delMaxWave||0)>=10)grant('del_wave10');
  if((G.stats.delMaxWave||0)>=20)grant('del_wave20');
  if(G.prestige>=1)grant('pres_1');
  if(G.prestige>=3)grant('pres_3');
  if(G.prestige>=5)grant('pres_5');
}

// ══════════ EXPEDITION ════════════════════════════════════════
function openExpedition(){
  if(!G.workers.length){showN('Нет работников!');return;}
  const idle=G.workers.filter(w=>w.status==='idle');
  // Don't block opening — show 'no free workers' inside modal instead
  // Build tier availability (normal maps only)
  const tierCounts={};
  Object.keys(G.maps).filter(k=>!isNaN(k)&&G.maps[k]>0).forEach(k=>{
    const t=parseInt(k);tierCounts[t]=(tierCounts[t]||0)+G.maps[k];
  });
  if(Object.keys(tierCounts).length<1){showN('Нет карт для экспедиции!');return;}
  // Restore last selection if maps still available
  const maxExpSlots=(G.factionUnlocks&&G.factionUnlocks.exp5)?5:3;
  let initSlots=Array(maxExpSlots).fill(null);
  if(G.lastExpSlots){
    const tc2={...tierCounts};
    const restored=G.lastExpSlots.map(t=>{
      if(t!==null&&tc2[t]>0){tc2[t]--;return t;}return null;
    });
    // Pad to maxExpSlots if needed
    initSlots=Array(maxExpSlots).fill(null);
    restored.forEach((v,i)=>{if(i<maxExpSlots)initSlots[i]=v;});
  }
  window._exp={slots:initSlots,wid:null,tierCounts,maxSlots:maxExpSlots};
  window._exp.render=function(){
    const {slots,wid,tierCounts}=window._exp;
    const selW=wid?G.workers.find(x=>x.id===wid):null;
    // Chance display
    let chHtml='';
    const filled=slots.filter(Boolean);
    if(selW&&filled.length===filled.length&&filled.length>0){
      const hardest=Math.max(...filled);
      const failH=1-calcCh(selW.dmg+selW.surv,hardest);
      const stepCh=Math.max(.03,1-Math.min(.65,failH*1.5));
      const steps=filled.length;
      const totalCh=Math.pow(stepCh,steps);

        '🗺 Шанс успеха: <b style="color:'+chcol(totalCh)+'">'+Math.round(totalCh*100)+'%</b> (все '+steps+' шага)'+
        '<div style="font-size:11px;color:var(--txt-d);margin-top:2px">Каждый шаг (T'+hardest+'): '+Math.round(stepCh*100)+'% · При провале — захват или ранение</div></div>';
    }
    // 3 slots
    const mxSh=window._exp.maxSlots||3;
    let html='<div style="font-size:13px;color:var(--txt-d);margin-bottom:6px">Выберите 3–5 карт и работника.</div><div style="font-size:11px;line-height:1.7;color:#6a6;background:rgba(30,60,30,.3);border:1px solid #3a5a3a;padding:6px 8px;border-radius:4px;margin-bottom:10px">💰 Золото ×1.2 за каждый шаг · 📦 Предметы ×1.5 · ⭐ Опыт<br><span style="color:#888">Больше карт → больше наград, но выше риск</span></div>';
    const mxS=window._exp.maxSlots||3;
    html+='<div style="display:grid;grid-template-columns:repeat('+mxS+',1fr);gap:6px;margin-bottom:10px">';
    slots.forEach((t,i)=>{
      const active=window._exp.pickSlot===i;
      html+='<div style="background:var(--bg4);border:2px solid '+(t?'var(--gold-d)':active?'var(--gold)':'var(--brd)')+';padding:8px;text-align:center;cursor:pointer;min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center" data-xslot="'+i+'">';
      if(t){const md=MAP_TIERS[t-1];html+='<div style="font-size:18px">'+md.em+'</div><div style="font-size:13px;color:var(--gold)">T'+t+'</div><div style="font-size:10px;color:var(--txt-d)">'+md.nm.slice(0,9)+'</div><div style="font-size:10px;color:var(--red);cursor:pointer" data-xslot-clear="'+i+'">✕</div>';}

function startExpedition(wid){
  const {slots,tierCounts}=window._exp;
  if(slots.filter(Boolean).length<3){showN('Выберите минимум 3 карты!');return;}
  const w=G.workers.find(x=>x.id===wid);if(!w||w.status!=='idle')return;
  // Check availability
  const filledSlots=slots.filter(Boolean);
  const needed={};filledSlots.forEach(t=>{needed[t]=(needed[t]||0)+1;});
  for(const t in needed){
    if((G.maps[parseInt(t)]||0)<needed[t]){showN('Не хватает карт T'+t+'!');return;}
  }
  for(const t in needed){G.maps[parseInt(t)]=Math.max(0,(G.maps[parseInt(t)]||0)-needed[t]);}
  G.lastExpSlots=[...filledSlots];
  w.status='exp';w.expTiers=[...filledSlots];w.expIdx=0;w.elapsed=0;w.prog=0;w.curMap=slots[0];
  log('🗺 '+w.name+' — экспедиция: T'+slots.join(', T'),'info');
  renderWorkers();renderMaps();
  // Reopen expedition modal with fresh state (don't close)
  setTimeout(()=>openExpedition(),50);
}

function genContract(){
  const tier=Math.min(16,Math.max(1,(G.maxTier||1)-2+Math.floor(Math.random()*4)));
  // Delirium wave contract — T16 only, rare
  const _hasT10c=Object.keys(G.cleared||{}).some(k=>parseInt(k)>=10&&G.cleared[k]);
  if(_hasT10c&&Math.random()<0.15&&!(G.contracts||[]).some(x=>x.type==='delirium_wave')){
    const waveTarget=Math.floor(2+Math.random()*4); // 2-5 (reachable early)
    const rwd=Math.floor(goldMax(MAP_TIERS[14])*(1+(G.prestigeBonus||0)/100)*2);
    return {id:++G.iid,type:'delirium_wave',nm:'👁 Делириум: волна '+waveTarget,em:'👁',
      desc:'Войдите в Делириум и доберитесь до волны '+waveTarget+' живым (без провала).',
      need:waveTarget,progress:0,reward:{gold:rwd},done:false,failed:false};
  }
  const opts=CONTRACT_TYPES.filter(ct=>{
    if(ct.id==='run_grd'&&!(G.maxTier>=16))return false;
    if(ct.id==='find_uniq'&&!(G.maxTier>=10))return false;
    return true;
  });
  const ct=opts[Math.floor(Math.random()*opts.length)];
  let c;
  if(ct.id==='run_tier')    c=ct.gen(Math.max(3,tier));
  else if(ct.id==='sell_items') c=ct.gen([3,5,8][Math.floor(Math.random()*3)]);
  else if(ct.id==='run_streak') c=ct.gen([3,5][Math.floor(Math.random()*2)]);
  else if(ct.id==='sell_gold'){const _gv=Math.floor(goldMax(MAP_TIERS[Math.min(15,(G.maxTier||1)-1)])*(1+(G.prestigeBonus||0)/100));const _mult=[0.3,0.5,0.7][Math.floor(Math.random()*3)];const _gt=Math.floor(_gv*_mult);c=ct.gen(Math.min(1000,Math.max(80,_gt)));}
  else c=ct.gen();
  c.id='con_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  return c;
}
function refreshContracts(){
  if(!hasFaction('syndicate'))return;
  // Remove done/failed contracts to make room
  G.contracts=G.contracts.filter(x=>(!x.done&&!x.failed)||(x.done&&x.needsClaim));
  const usedTypes=new Set(G.contracts.map(x=>x.type));
  // Always fill 4 normal contracts
  let attempts=0;
  while(G.contracts.filter(x=>!x.done&&!x.failed&&!(x.type&&x.type.startsWith('master_'))&&x.type!=='delirium_wave').length<4&&attempts<30){
    attempts++;
    const nc=genContract();
    // genContract may return delirium_wave — only allow 1
    if(nc.type==='delirium_wave'){
      if(!usedTypes.has('delirium_wave')){usedTypes.add('delirium_wave');G.contracts.push(nc);}
    }else{
      if(!usedTypes.has(nc.type)){usedTypes.add(nc.type);G.contracts.push(nc);}
    }
  }
  // Master contract: every 3rd reroll as 5th BONUS slot (doesn't displace normal ones)
  G.contractRerolls=(G.contractRerolls||0)+1;
  if(!G.contracts.some(x=>x.type&&x.type.startsWith('master_')&&!x.done&&!x.failed)){
    if(G.contractRerolls%3===0){tryAddMasterContract(true);}
  }
  renderContracts();
}
function tickContracts(){
  if(!hasFaction('syndicate'))return;
  G.contractRunsDone=(G.contractRunsDone||0);
}
function checkContractRun(tier,result){
  // result: 'ok'|'injured'|'captured'
  if(!hasFaction('syndicate'))return;
  G.contractRunsDone=(G.contractRunsDone||0)+1;
  G.contracts.forEach(con=>{
    if(con.done)return;
    if(con.type==='run_tier'&&tier>=con.tier&&result==='ok'){con.progress=Math.min(con.need,con.progress+1);}
    if(con.type==='run_streak'){
      if(result==='ok'){con.curStreak=(con.curStreak||0)+1;con.progress=Math.min(con.need,con.curStreak);}
      else{con.curStreak=0;con.progress=0;}
    }
    if(con.type==='run_grd'&&tier>=16&&result==='ok'){con.progress=Math.min(con.need,con.progress+1);}
    if(con.progress>=con.need)completeContract(con);
  });
  // Refresh contracts every 5 runs
  if(G.contractRunsDone%5===0){
    G.contracts=G.contracts.filter(c=>!c.done);
    refreshContracts();
  }
  renderContracts();
}

// Chance to pass wave n (decreases with power scaling)
function delWaveCh(wave){
  const power=sDmg()+sSurv();
  const baseDgr=300+wave*120; // scales up per wave
  const raw=(power/baseDgr-0.2)/0.7;
  return Math.max(0.05,Math.min(0.95,raw));
}
// Rewards per wave
function delWaveReward(wave){
  // Splinters main currency; guaranteed orb every wave 5+
  const splinters=wave<=2?1:wave<=5?2:Math.floor(1+wave*0.6);
  const orbs=wave>=5?1:0;
  return {orbs,splinters};
}

function nextWaveBlock(n,ch,wdef,rwd){
  const chColor=ch>=0.7?'#44cc44':ch>=0.4?'#cccc44':'#cc4444';
  return '<div style="background:rgba(40,0,60,.4);border:1px solid #442255;border-radius:5px;padding:10px;font-size:12px">'+
    '<div style="color:#cc88ff;font-family:Cinzel,serif;margin-bottom:6px">Следующая: Волна '+n+' — '+wdef.em+' '+wdef.nm+'</div>'+
    '<div style="color:var(--txt-d);margin-bottom:4px">👾 '+wdef.mobs+(wdef.boss?' · 💀 Босс: <span style="color:#ff7744">'+wdef.boss+'</span>':'')+'</div>'+
    '<div style="margin-bottom:4px">Шанс пройти: <span style="color:'+chColor+';font-size:13px;font-weight:600">'+Math.round(ch*100)+'%</span></div>'+
    '<div style="color:#aa66ff">Награда: 🔮 +'+rwd.orbs+' орбов'+(rwd.splinters?' · 👁 +'+rwd.splinters+' осколков':'')+'</div>'+
  '</div>';
}

function startDeliriumRun(){
  if(G.selfRun){showN('Сначала завершите текущий поход!');return;}
  G.deliriumWave=0;G.deliriumPending=[];G.deliriumRunning=true;
  advanceDeliriumWave();
}

function continueDelirium(){
  if(G.selfRun){showN('Сначала завершите текущий поход!');return;}
  G.deliriumRunning=true;
  advanceDeliriumWave();
}

function advanceDeliriumWave(){
  G.deliriumWave=(G.deliriumWave||0)+1;
  G.deliriumRunning=true;
  if(window._delTimer)clearInterval(window._delTimer);
  renderDelirium();
  let progress=0;
  const waveTime=Math.floor((2000+G.deliriumWave*300)*1.2);
  const steps=waveTime/50;
  window._delTimer=setInterval(()=>{
    progress+=1/steps;
    const bar=document.getElementById('del-prog');
    const lbl=document.getElementById('del-prog-lbl');
    if(bar)bar.style.width=Math.min(100,Math.round(progress*100))+'%';
    if(lbl)lbl.textContent=progress<0.5?'Сражаетесь...':progress<0.9?'Финальный натиск...':'Исход решается...';
    if(progress>=1){clearInterval(window._delTimer);window._delTimer=null;resolveDeliriumWave();}
  },50);
}

function resolveDeliriumWave(){
  const wave=G.deliriumWave;
  const ch=delWaveCh(wave);
  const _delOrbActive=G.deliriumMaps&&G.deliriumMaps[String(G.selfRun&&(G.selfRun.mapKey||G.selMap)||'')];
  const ok=Math.random()<ch;
  G.deliriumRunning=false;window._delTimer=null;
  if(!ok){
    // Death — lose all pending
    const lostOrbs=G.deliriumPending.reduce((a,r)=>a+r.orbs,0);
    const lostSpl=G.deliriumPending.reduce((a,r)=>a+r.splinters,0);
    G.deliriumWave=0;G.deliriumPending=[];
    sfxDeath();
    log('💀 Погибли в Делирии на волне '+wave+'! Потеряно: 🔮'+lostOrbs+' 👁'+lostSpl,'ev');
    showN('💀 Делирий: гибель на волне '+wave+'!','red');
    const el=document.getElementById('delirium-portal');
    if(el){
      const wdef=getDelWave(wave);
      el.innerHTML='<div style="padding:20px;text-align:center">'+
        '<div style="font-size:36px;margin-bottom:8px">💀</div>'+
        '<div style="font-size:16px;color:#ff4444;margin-bottom:6px">Вы пали на волне '+wave+'</div>'+
        '<div style="font-size:13px;color:var(--txt-d);margin-bottom:4px">'+wdef.em+' '+wdef.nm+' оказался сильнее</div>'+
        '<div style="font-size:12px;color:#ff6666;margin-bottom:16px">Потеряно: 🔮'+lostOrbs+' орбов · 👁'+lostSpl+' осколков</div>'+
        '<div style="display:flex;gap:8px;justify-content:center;margin-top:4px">'+
        '<button class="btn" onclick="renderDelirium()">↩ Ко входу</button>'+
        '<button class="btn btn-p" style="background:#330033;border-color:#aa44aa" onclick="startDeliriumRun()">▶ Снова с волны 1</button>'+
        '</div>'+
      '</div>';
    }
    save();return;
  }
  // Success — collect reward
  const rwd=delWaveReward(wave);
  // Cluster jewel drop: wave 8+, ~20% chance — store in rwd for pending
  if(wave>=8&&Math.random()<0.20){rwd.cluster=genCluster(wave);}
  G.deliriumPending.push(rwd);
  G.stats.delWaves=(G.stats.delWaves||0)+1;
  G.stats.delMaxWave=Math.max(G.stats.delMaxWave||0,wave);
  G.stats.delWaves=(G.stats.delWaves||0)+1;
  G.stats.delMaxWave=Math.max(G.stats.delMaxWave||0,wave);
  sfxDeliriumWave();log('✅ Делирий волна '+wave+' пройдена! +👁'+rwd.splinters+(rwd.orbs?' +🔮'+rwd.orbs:''),'info');
  save();
  renderDelirium();
}

function exitDelirium(died){
  if(died)return; // called from resolveDeliriumWave on death
  // Collect all pending rewards
  const totalOrbs=G.deliriumPending.reduce((a,r)=>a+r.orbs,0);
  const totalSpl=G.deliriumPending.reduce((a,r)=>a+r.splinters,0);
  G.deliriumOrbs=(G.deliriumOrbs||0)+totalOrbs;
  G.deliriumSplinters=(G.deliriumSplinters||0)+totalSpl;
  G.deliriumPending.forEach(r=>{if(r.cluster){G.inv.push(r.cluster);log('🔮 Получен Кластерный Самоцвет: '+r.cluster.name,'i-r');}});
  // Check delirium wave contracts — highest wave REACHED (pending.length = waves cleared)
  const _wavesCleared=G.deliriumPending.length; // e.g. cleared waves 1,2,3 = length 3
  (G.contracts||[]).forEach(con=>{
    if(con.type==='delirium_wave'&&!con.done&&!con.failed){
      con.progress=Math.max(con.progress||0,_wavesCleared);
      if(_wavesCleared>=con.need){completeContract(con);}
      else{renderContracts();}
    }
  });
  G.deliriumPending=[];G.deliriumWave=0;G.deliriumRunning=false;
  log('🌫️ Вышли из Делириума. Получено: 🔮'+totalOrbs+' орбов · 👁'+totalSpl+' осколков','info');
  showN('🌫️ +🔮'+totalOrbs+' орбов · +👁'+totalSpl+' осколков','pur');
  updateRes();save();renderDelirium();
}

// Apply delirium orb to selected map
function applyDeliriumOrb(key){
  if(!G.deliriumOrbs||G.deliriumOrbs<1){showN('Нет орбов делириума!');return;}
  if(!G.maps[key]||G.maps[key]<1){showN('Нет такой карты!');return;}
  if(!G.deliriumMaps)G.deliriumMaps={};
  if(G.deliriumMaps[key]){showN('Уже применён орб!');return;}
  G.deliriumOrbs--;G.deliriumMaps[key]=true;
  showN('🔮 Орб делириума применён! +20% дроп и золото','pur');
  renderMaps();updateRes();save();
}

function tryAddMasterContract(forced){
  if(!hasFaction('syndicate'))return;
  if(!G.contracts)G.contracts=[];
  // Check if already have an ACTIVE (not done/failed) master contract
  if(G.contracts.some(x=>x.type&&x.type.startsWith('master_')&&!x.done&&!x.failed))return;
  // Allow master as 5th bonus — only block if already have active master
  if(G.contracts.filter(x=>x.type&&x.type.startsWith('master_')&&!x.done&&!x.failed).length>=1)return;
  let def=null;
  if(forced){
    // Guaranteed — pick brawl or raid (boss_hunt only if T16)
    def=(G.cleared&&G.cleared[16]&&Math.random()<0.15)?MASTER_CONTRACT_DEFS[2]:MASTER_CONTRACT_DEFS[Math.floor(Math.random()*2)];
  }else{
    const roll=Math.random();
    if(roll<0.20){def=MASTER_CONTRACT_DEFS[Math.floor(Math.random()*2)];}
    else if(G.cleared&&G.cleared[16]&&roll<0.25){def=MASTER_CONTRACT_DEFS[2];}
  }
  if(!def)return;
  const mc=def.gen();
  mc.id='master_'+Date.now()+'_'+Math.random().toString(36).slice(2,5);
  G.contracts.push(mc);
  log('📋 Новый заказ Синдиката: '+mc.nm,'ev');
  showN('📋 '+mc.nm+' · '+mc.ch+'% шанс','pur');
  renderContracts();
}

function startMasterContract(id){
  if(G.selfRun||G.actRun){showN('Сначала завершите текущий поход!');return;}
  const con=G.contracts.find(x=>x.id===id);
  if(!con||con.done||con.failed||con.active)return;
  con.active=true;
  renderContracts();
  // Animate fight
  if(window._masterTimer)clearInterval(window._masterTimer);
  let prog=0;
  const fightTime=3000+Math.random()*2000;
  const steps=fightTime/60;
  window._masterTimer=setInterval(()=>{
    prog+=1/steps;
    const bar=document.getElementById('mcon-prog-'+id);
    const lbl=document.getElementById('mcon-lbl-'+id);
    if(bar)bar.style.width=Math.min(100,Math.round(prog*100))+'%';
    if(lbl)lbl.textContent=prog<0.4?'Вступаете в бой...':prog<0.75?'Сражаетесь!':prog<0.95?'Финальный удар...':'Исход...';
    if(prog>=1){
      clearInterval(window._masterTimer);window._masterTimer=null;
      resolveMasterContract(id);
    }
  },60);
}

function resolveMasterContract(id){
  const con=G.contracts.find(x=>x.id===id);
  if(!con)return;
  con.active=false;
  const ok=Math.random()*100<con.ch;
  if(ok){
    completeContract(con);
  }else{
    con.failed=true;
    log('❌ Заказ провален: '+con.nm,'ev');
    showN('❌ '+con.nm+' — провалено!','red');
    save();
  }
  renderContracts();
}


// ══════════ AUDIO ══════════════════════════════════════════════
function playTone(freq,dur,type,vol){
  try{
    const ctx=window._aC||(window._aC=new(window.AudioContext||window.webkitAudioContext)());
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type||'sine';o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.18,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start();o.stop(ctx.currentTime+dur);
  }catch(e){}
}
function sfxLevelUp(){playTone(523,.12,'sine',.2);setTimeout(()=>playTone(659,.12,'sine',.18),120);setTimeout(()=>playTone(784,.22,'sine',.22),240);}
function sfxDeath(){playTone(220,.18,'sawtooth',.15);setTimeout(()=>playTone(180,.35,'sawtooth',.12),200);}
function sfxGold(){playTone(880,.06,'sine',.08);setTimeout(()=>playTone(1047,.1,'sine',.07),80);}
function sfxDeliriumWave(){playTone(300,.15,'sine',.06);setTimeout(()=>playTone(350,.2,'sine',.05),180);} // subtle low pulse
function sfxContract(){playTone(660,.1,'sine',.1);setTimeout(()=>playTone(880,.15,'sine',.1),110);}
// ══════════ TICK ══════════════════════════════════════════════
function tick(){
  G.gt+=200;  // logical time always +200ms per tick
  // Auto-buy maps for Maraketh
  if(G.autoBuyMaps&&hasFaction('maraketh')&&G.lastExpSlots&&G.lastExpSlots.length){
    // Count exactly how many of each tier the last expedition needed
    const needed={};G.lastExpSlots.filter(Boolean).forEach(t=>{needed[t]=(needed[t]||0)+1;});
    Object.keys(needed).forEach(t=>{
      const ti=parseInt(t),req=needed[t],cost=SHOP_COSTS[ti]||0;
      if(cost>0&&(G.maps[ti]||0)<req&&G.gold>=cost){G.gold-=cost;G.maps[ti]=(G.maps[ti]||0)+1;}
    });
  }
  // Self run
  if(G.selfRun){
    G.selfRun.elapsed+=200;const _spd=G.syndRunSpeed||1.0;const pct=Math.min(1,G.selfRun.elapsed/(G.selfRun.md.time*1000/_spd));
    const f=document.getElementById('rpf');if(f)f.style.width=(pct*100)+'%';
    const p=document.getElementById('rpp');if(p)p.textContent=Math.floor(pct*100)+'%';
    if(pct>=1)completeSelfRun();
  }
  // Act run
  if(G.actRun){
    G.actRun.elapsed+=200;const pct=Math.min(1,G.actRun.elapsed/(G.actRun.act.time*1000));
    const f=document.getElementById('apf-'+G.actRun.act.id);if(f)f.style.width=(pct*100)+'%';
    const l=document.getElementById('apct-'+G.actRun.act.id);if(l)l.textContent=Math.floor(pct*100)+'%';
    if(pct>=1)completeAct();
  }
  // Workers
  let wch=false;
  G.workers.forEach(w=>{
    if(w.status==='running'||w.status==='exp'){
      w.elapsed+=200;
      const tier=w.status==='exp'?w.expTiers[w.expIdx]:w.curMap;
      const md=w.isGrd&&w.curMapKey?getMd(w.curMapKey):(MAP_TIERS[tier-1]||MAP_TIERS[15]);
      const spd=w.cls==='ranger'?1.25:1;
      w.prog=Math.min(1,w.elapsed/(md.time*1000/spd));
      if(w.prog>=1){if(w.status==='running')resolveWorker(w,md);else resolveExpStep(w);wch=true;}
    }else if(w.status==='injured'){
      const hd=Math.max(5000,(10+(w.curMap||1)*2)*1000*(1-G.ups.heal*.2));
      if(G.gt-w.injuredAt>=hd){w.status='idle';log('💊 '+w.name+' восстановился!','info');wch=true;if(G.autoHeal&&hasFaction('maraketh'))setTimeout(()=>tryAutoExp(w),300);}
    }
    const wp=document.getElementById('wp-'+w.id);if(wp)wp.style.width=(w.prog*100)+'%';
    if(w.status==='injured'){
      const hp=document.getElementById('hp-'+w.id);
      if(hp){const hd=Math.max(5000,(10+(w.curMap||1)*2)*1000*(1-G.ups.heal*.2));hp.style.width=(Math.min(1,(G.gt-w.injuredAt)/hd)*100)+'%';}
    }
  });

function updateSelfStats(){
  if(!document.getElementById('s-dmg'))return; // after reset DOM may be replaced
  const d=sDmg(),s=sSurv();
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set('s-dmg',d);set('s-surv',s);set('s-lvl',G.selfLevel);
  // XP bar

  const xpTxt=document.getElementById('s-lvl-xp');

  else{const xpPct=Math.min(1,(G.selfXp-WLVLS[dispLvl])/(WLVLS[dispLvl+1]-WLVLS[dispLvl]));if(xpBar)xpBar.style.width=(xpPct*100)+'%';if(xpTxt)xpTxt.textContent=(WLVLS[dispLvl+1]-G.selfXp)+' до Ур.'+(dispLvl+1);}

  // Show noble class if prestige unlocked
  const nb=document.getElementById('cls-noble');
  if(nb)nb.style.display=G.prestige>0?'inline-block':'none';
  ['warrior','mage','ranger','noble'].forEach(cl=>{
    const b=document.getElementById('cls-'+cl);if(!b)return;
    const active=cl===(G.selfCls||'warrior');
    b.style.borderColor=active?'var(--gold)':'var(--gold-d)';
    b.disabled=G.clsLocked&&!active;
    b.title=G.clsLocked&&!active?'Класс заблокирован. Смените в Лавке за 200💰':'';
  });
  const ec=document.getElementById('s-ch');
  if(ec){
    if(G.selMap){
      const k=String(G.selMap);
      const t=parseMapKey(k);
      const isC=k.startsWith('c');const isU=k.startsWith('u');const isG=k.startsWith('grd_');
      const isB=k.startsWith('boss_');
      const effT=t+(isC?1:0)+(isU?1:0);
      const mod=isG?-.12:isB?-.05:0;
      let ch;
      if(isB){const bD=BOSSES.find(b=>'boss_'+b.id===k);const bDgr=bD?bD.dgr:1800;const bCap=bD?(bD.id==='shaper'?0.70:bD.id==='eater'?0.75:0.80):0.80;const raw=((d+s)/bDgr-0.2)/0.7;ch=Math.max(.03,Math.min(bCap,raw)+mod);}
      else{const rawCh=calcCh(d+s,Math.min(16,effT))+mod;ch=Math.max(.03,isG?Math.min(0.85,rawCh):rawCh);}
      ec.innerHTML='<span style="color:'+chcol(ch)+'">'+(isG?'🔷 ':'')+Math.round(ch*100)+'% '+(isG?'[Страж]':'T'+t)+'</span>';
    }else ec.textContent='— (нет карты)';
  }
}

  G.gold-=cost;

    recalcW(w);log('✅ '+w.name+' надел '+item.em+' '+item.name,'info');openWorkerEq(ownerId);
  }else{
    if(G.selfEq[slot])G.inv.push(G.selfEq[slot]);G.selfEq[slot]=item;G.inv=G.inv.filter(x=>x.id!==itemId);

}

function scheduleTick(){
  const now=performance.now();
  const elapsed=now-window._lastTick;
  window._lastTick=now;
  window._tickAccum+=elapsed;
  while(window._tickAccum>=200){window._tickAccum-=200;tick();}
  window._rafId=requestAnimationFrame(scheduleTick);
}
if(window._rafId)cancelAnimationFrame(window._rafId);
scheduleTick();

// ══════════ INIT ══════════════════════════════════════════════
function init(){
  load();renderAll();
  // Self-correcting tick loop — survives background tab throttling
window._lastTick=performance.now();
window._tickAccum=0;
function scheduleTick(){
  const now=performance.now();
  const elapsed=now-window._lastTick;
  window._lastTick=now;
  window._tickAccum+=elapsed;
  while(window._tickAccum>=200){window._tickAccum-=200;tick();}
  window._rafId=requestAnimationFrame(scheduleTick);
}
if(window._rafId)cancelAnimationFrame(window._rafId);
scheduleTick();
  window._saveId=setInterval(save,8000);
  log('🌟 Добро пожаловать! Картоходец v'+VERSION,'info');
  if(G.firstRun){G.firstRun=false;save();setTimeout(openTutorial,300);}
}
init();
